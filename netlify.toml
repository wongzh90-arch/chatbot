[build]
  command = "node netlify/inject-preview-bypass.js"

[[edge_functions]]
  function = "deepseek-proxy"
  path = "/.netlify/functions/deepseek-proxy"

[[edge_functions]]
  function = "openrouter-proxy"
  path = "/.netlify/functions/openrouter-proxy"

[[edge_functions]]
  function = "firecrawl-proxy"
  path = "/.netlify/functions/firecrawl-proxy"

[[edge_functions]]
  function = "langsearch-proxy"
  path = "/.netlify/functions/langsearch-proxy"

[[edge_functions]]
  function = "executor-proxy"
  path = "/.netlify/functions/executor-proxy/*"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://cc-copy.netlify.app"
    Access-Control-Allow-Methods = "GET, POST"
    Access-Control-Allow-Headers = "*"
