<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Self‑Recursive Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            -webkit-font-smoothing: antialiased;
            height: 100%;
            overflow: hidden;
        }
        #root {
            height: 100dvh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        #root.light-theme {
            background: #f5f5f5 !important;
            color: #1a1a1a !important;
        }
        #root.light-theme input,
        #root.light-theme select,
        #root.light-theme button,
        #root.light-theme textarea {
            color: #1a1a1a;
        }
        #root input, #root select, #root button, #root textarea {
            color: white;
            font-family: inherit;
            font-size: 16px;
        }
        button {
            cursor: pointer;
            min-height: 44px;
            min-width: 44px;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "react":             "https://esm.sh/react@18.3.1",
                "react-dom":         "https://esm.sh/react-dom@18.3.1",
                "react-dom/client":  "https://esm.sh/react-dom@18.3.1/client",
                "zustand":           "https://esm.sh/zustand@4.5.2?external=react",
                "zustand/middleware":"https://esm.sh/zustand@4.5.2/middleware?external=react"
            }
        }
    </script>
<base target="_blank">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
