<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Web – Solo Edition</title>
    <style>
        body { margin: 0; }
        #login-gate {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0a0a0a;
            color: #eee;
            font-family: system-ui, sans-serif;
        }
        #login-gate.hidden { display: none; }
        #login-gate form {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2a2a2a;
            min-width: 280px;
        }
        #login-gate h2 { margin: 0 0 0.5rem; font-size: 1.1rem; color: #f59e0b; }
        #login-gate input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #333;
            background: #111;
            color: #eee;
            border-radius: 8px;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
        }
        #login-gate input:focus { border-color: #f59e0b; }
        #login-gate button {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.5rem;
            background: #f59e0b;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        #login-gate button:hover { background: #fbbf24; }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Bounce animation for typing dots */
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
        }
        .animate-bounce { animation: bounce 1s infinite; }

        /* Line clamp */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Password Gate -->
    <div id="login-gate">
        <form id="login-form">
            <h2>⚡ Claude Code Web</h2>
            <p style="font-size:0.8rem; color:#666; margin: 0 0 1rem">Enter your password to continue</p>
            <input type="password" id="password-input" placeholder="Password" required autofocus>
            <button type="submit">Unlock →</button>
        </form>
    </div>

    <!-- Main App (initially hidden) -->
    <div id="root" style="display:none"></div>

    <script>
        const PASSWORD_HASH = 'c1366f39d8847f3659cdd75c4d9d4fe3f3c0f77782ffe2c41c995e844d68521f';

        (function() {
            const gate = document.getElementById('login-gate');
            const form = document.getElementById('login-form');
            const input = document.getElementById('password-input');

            const token = sessionStorage.getItem('auth_token');
            if (token === PASSWORD_HASH) { showApp(); return; }
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input.value));
                const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
                if (hashHex === PASSWORD_HASH) {
                    sessionStorage.setItem('auth_token', hashHex);
                    showApp();
                } else {
                    input.style.borderColor = '#ef4444';
                    setTimeout(() => input.style.borderColor = '', 1200);
                    input.value = '';
                    input.focus();
                }
            });

            function showApp() {
                gate.classList.add('hidden');
                document.getElementById('root').style.display = '';
            }
        })();
    </script>

    <!-- App modules -->
    <script type="text/babel" src="js/utils/markdown.js"></script>
    <script type="text/babel" src="js/utils/commands.js"></script>
    <script type="text/babel" src="js/utils/agentSkills.js"></script>
    <script type="text/babel" src="js/utils/intentDetector.js"></script>
    <script type="text/babel" src="js/utils/contextMatcher.js"></script>
    <script type="text/babel" src="js/utils/ErrorBoundary.jsx"></script>
    <script type="text/babel" src="js/services/modelRegistry.js"></script>
    <script type="text/babel" src="js/services/github.js"></script>
    <script type="text/babel" src="js/services/llmProvider.js"></script>
    <script type="text/babel" src="js/utils/sanityCheck.js"></script>   <!-- NEW -->
    <script type="text/babel" src="js/services/webSearch.js"></script>
    <script type="text/babel" src="js/services/summaryService.js"></script>
    <script type="text/babel" src="js/components/SummaryPanel.jsx"></script>
    <script type="text/babel" src="js/services/taskManager.js"></script>
    <script type="text/babel" src="js/agents/planner.js"></script>
    <script type="text/babel" src="js/agents/executor.js"></script>
    <script type="text/babel" src="js/agents/reviewer.js"></script>
    <script type="text/babel" src="js/agents/orchestrator.js"></script>
    <script type="text/babel" src="js/components/Navbar.jsx"></script>
    <script type="text/babel" src="js/components/EditorPane.jsx"></script>
    <script type="text/babel" src="js/components/ChatPane.jsx"></script>
    <script type="text/babel" src="js/components/LeftPane.jsx"></script>
    <script type="text/babel" src="js/components/TaskBoard.jsx"></script>
    <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
