<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Web – Solo Edition</title>
    <style>
        body { margin: 0; }
        #login-gate {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0a0a0a;
            color: #eee;
            font-family: system-ui, sans-serif;
        }
        #login-gate.hidden { display: none; }
        #login-gate form {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
        }
        #login-gate input {
            width: 100%;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border: 1px solid #333;
            background: #222;
            color: #eee;
            border-radius: 4px;
        }
        #login-gate button {
            width: 100%;
            padding: 0.5rem;
            background: #f59e0b;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Password Gate -->
    <div id="login-gate">
        <form id="login-form">
            <h2>Private App</h2>
            <p style="font-size:0.8rem; color:#999">Enter your password to continue</p>
            <input type="password" id="password-input" placeholder="Password" required autofocus>
            <button type="submit">Unlock</button>
        </form>
    </div>

    <!-- Main App (initially hidden) -->
    <div id="root" style="display:none"></div>

    <script>
        // Replace this with YOUR password hash (SHA‑256)
        // Generate at: https://emn178.github.io/online-tools/sha256.html
        const PASSWORD_HASH = 'c1366f39d8847f3659cdd75c4d9d4fe3f3c0f77782ffe2c41c995e844d68521f';

        (function() {
            const token = sessionStorage.getItem('auth_token');
            if (token === PASSWORD_HASH) {
                showApp();
                return;
            }

            const gate = document.getElementById('login-gate');
            const root = document.getElementById('root');
            const form = document.getElementById('login-form');
            const input = document.getElementById('password-input');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const password = input.value;
                const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                if (hashHex === PASSWORD_HASH) {
                    sessionStorage.setItem('auth_token', hashHex);
                    showApp();
                } else {
                    alert('Incorrect password');
                    input.value = '';
                    input.focus();
                }
            });

            function showApp() {
                gate.classList.add('hidden');
                root.style.display = '';
            }
        })();
    </script>

    <!-- CDN scripts (NO integrity hashes, NO CSP) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>

    <!-- App modules -->
    <script type="text/babel" src="js/utils/markdown.js"></script>
    <script type="text/babel" src="js/utils/commands.js"></script>
    <script type="text/babel" src="js/utils/agentSkills.js"></script>
    <script type="text/babel" src="js/services/github.js"></script>
    <script type="text/babel" src="js/services/openrouter.js"></script>
    <script type="text/babel" src="js/services/webSearch.js"></script>
    <script type="text/babel" src="js/services/taskManager.js"></script>
    <script type="text/babel" src="js/agents/planner.js"></script>
    <script type="text/babel" src="js/agents/executor.js"></script>
    <script type="text/babel" src="js/agents/reviewer.js"></script>
    <script type="text/babel" src="js/agents/orchestrator.js"></script>
    <script type="text/babel" src="js/components/Navbar.jsx"></script>
    <script type="text/babel" src="js/components/EditorPane.jsx"></script>
    <script type="text/babel" src="js/components/ChatPane.jsx"></script>
    <script type="text/babel" src="js/components/LeftPane.jsx"></script>
    <script type="text/babel" src="js/components/TaskBoard.jsx"></script>
    <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
