<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Web – Solo Edition</title>

    <!-- Tailwind CSS (must come first) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; }
        #login-gate {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0a0a0a;
            color: #eee;
            font-family: system-ui, sans-serif;
        }
        #login-gate.hidden { display: none; }
        #login-gate form {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2a2a2a;
            min-width: 280px;
        }
        #login-gate h2 { margin: 0 0 0.5rem; font-size: 1.1rem; color: #f59e0b; }
        #login-gate input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #333;
            background: #111;
            color: #eee;
            border-radius: 8px;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
        }
        #login-gate input:focus { border-color: #f59e0b; }
        #login-gate button {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.5rem;
            background: #f59e0b;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        #login-gate button:hover { background: #fbbf24; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #52525b; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
        }
        .animate-bounce { animation: bounce 1s infinite; }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
